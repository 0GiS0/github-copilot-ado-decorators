<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Failure Analysis</title>
    <script src="lib/VSS.SDK.min.js"></script>
    <style>
        :root {
            --cp-purple: #8957e5;
            --cp-purple-dark: #6e40c9;
            --cp-purple-light: #c297ff;
            --cp-bg: #f6f8fa;
            --cp-surface: #ffffff;
            --cp-text: #24292f;
            --cp-text-muted: #656d76;
            --cp-border: #d0d7de;
            --cp-success: #1a7f37;
            --cp-success-bg: #dafbe1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--cp-bg);
            color: var(--cp-text);
        }

        /* --- Screen containers --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 55vh;
            padding: 48px 24px;
            animation: fadeIn 0.35s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Spinner --- */
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid var(--cp-border);
            border-top-color: var(--cp-purple);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text { font-size: 15px; color: var(--cp-text-muted); }

        /* --- All‑good --- */
        .hero-emoji { font-size: 64px; margin-bottom: 20px; }
        .allgood-title {
            font-size: 26px; font-weight: 600;
            color: var(--cp-success); margin-bottom: 10px;
        }
        .allgood-sub {
            color: var(--cp-text-muted); font-size: 15px; margin-bottom: 20px;
        }
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--cp-success-bg); color: var(--cp-success);
            padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 500;
        }

        /* --- Running --- */
        .running-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .running-sub   { font-size: 14px; color: var(--cp-text-muted); }

        /* --- Analysis content --- */
        #analysis { display: none; padding: 24px; animation: fadeIn 0.35s ease; }
        #analysis.active { display: block; }

        .analysis-header {
            background: linear-gradient(135deg, var(--cp-purple), var(--cp-purple-dark));
            color: #fff; padding: 22px 28px;
            border-radius: 12px 12px 0 0;
            display: flex; align-items: center; gap: 14px;
        }
        .analysis-header-icon { font-size: 30px; }
        .analysis-header h1   { font-size: 19px; font-weight: 600; margin: 0; }
        .analysis-header p    { font-size: 13px; opacity: 0.85; margin-top: 3px; }

        .analysis-body {
            background: var(--cp-surface);
            border: 1px solid var(--cp-border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 28px 32px;
            line-height: 1.65;
        }

        /* Markdown styles inside the analysis body */
        .analysis-body h1 { display: none; }
        .analysis-body h2 {
            font-size: 19px; margin: 28px 0 10px;
            padding-bottom: 6px; border-bottom: 1px solid var(--cp-border);
        }
        .analysis-body h3 { font-size: 16px; margin: 22px 0 8px; }
        .analysis-body p  { margin: 8px 0; }
        .analysis-body ul,
        .analysis-body ol { margin: 8px 0 8px 24px; }
        .analysis-body li { margin: 4px 0; }
        .analysis-body code {
            background: #eff1f3; padding: 2px 6px;
            border-radius: 4px; font-size: 13px;
        }
        .analysis-body pre {
            background: #1e1e1e; color: #d4d4d4;
            padding: 16px; border-radius: 8px;
            overflow-x: auto; margin: 14px 0;
            font-size: 13px;
        }
        .analysis-body pre code {
            background: none; padding: 0; color: inherit;
        }
        .analysis-body table { border-collapse: collapse; width: 100%; margin: 14px 0; }
        .analysis-body th,
        .analysis-body td { border: 1px solid var(--cp-border); padding: 8px 12px; text-align: left; }
        .analysis-body th { background: var(--cp-bg); font-weight: 600; }
        .analysis-body blockquote {
            border-left: 4px solid var(--cp-purple-light);
            padding: 10px 16px; margin: 14px 0;
            background: #f3f0ff; border-radius: 0 8px 8px 0;
            color: var(--cp-text-muted);
        }
        .analysis-body hr { border: none; border-top: 1px solid var(--cp-border); margin: 24px 0; }
        .analysis-body img { max-width: 100%; border-radius: 8px; }

        /* Error card */
        .error-card {
            background: #fff3cd; border: 1px solid #ffc107;
            padding: 16px 20px; border-radius: 10px;
            margin-top: 24px; text-align: center;
            font-size: 14px; color: #664d03;
            max-width: 480px;
        }
    </style>
</head>
<body>

    <!-- 1) Loading -->
    <div id="loading" class="screen active">
        <div class="spinner"></div>
        <p class="status-text">Loading Copilot analysis…</p>
    </div>

    <!-- 2) Build still running -->
    <div id="running" class="screen">
        <div class="hero-emoji">🤖</div>
        <div class="running-title">Standing by…</div>
        <p class="running-sub">The analysis will appear here once the build completes.</p>
    </div>

    <!-- 3) All good (no failures) -->
    <div id="allgood" class="screen">
        <div class="hero-emoji">✨</div>
        <div class="allgood-title">All good!</div>
        <p class="allgood-sub">No failures detected in this pipeline run.</p>
        <span class="badge">✅ All steps completed successfully</span>
    </div>

    <!-- 5) Error / debug info -->
    <div id="error" class="screen">
        <div class="hero-emoji">⚠️</div>
        <div class="running-title">Could not load analysis</div>
        <p class="running-sub" id="error-detail" style="margin-top:8px;max-width:600px;word-break:break-all;"></p>
        <div class="error-card" id="error-log" style="text-align:left;font-family:monospace;font-size:12px;white-space:pre-wrap;max-height:200px;overflow:auto;margin-top:16px;max-width:700px;"></div>
    </div>

    <!-- 4) Analysis results -->
    <div id="analysis">
        <div class="analysis-header">
            <span class="analysis-header-icon">🤖</span>
            <div>
                <h1>Copilot Failure Analysis</h1>
                <p>AI-powered root cause analysis</p>
            </div>
        </div>
        <div class="analysis-body" id="analysis-content"></div>
    </div>

    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>

    <script>
        /* ---- constants ---- */
        var ATTACHMENT_TYPE  = "copilot-analysis";
        var ATTACHMENT_NAME  = "report";
        var LOADING_TIMEOUT  = 25000;

        /* ---- debug log buffer ---- */
        var _logs = [];
        function log(msg) {
            var line = new Date().toISOString().substr(11, 12) + ' ' + msg;
            _logs.push(line);
            console.log('[CopilotTab] ' + msg);
        }

        /* ---- iframe auto-resize ---- */
        function notifyResize() {
            try {
                var h = document.documentElement.scrollHeight
                     || document.body.scrollHeight;
                log('notifyResize h=' + h);
                VSS.resize(undefined, h);
            } catch (_) {}
        }

        /* ResizeObserver: automatically resize whenever content changes */
        if (typeof ResizeObserver !== 'undefined') {
            new ResizeObserver(function () { notifyResize(); })
                .observe(document.body);
        }

        /* ---- helpers ---- */
        function showScreen(id) {
            log('showScreen → ' + id);
            var all = document.querySelectorAll('.screen, #analysis');
            for (var i = 0; i < all.length; i++) {
                all[i].classList.remove('active');
                if (!all[i].classList.contains('screen')) all[i].style.display = 'none';
            }
            var el = document.getElementById(id);
            if (!el) return;
            el.classList.add('active');
            if (id === 'analysis') el.style.display = 'block';

            /* Resize after DOM settles — multiple attempts for safety */
            setTimeout(notifyResize, 0);
            setTimeout(notifyResize, 200);
            setTimeout(notifyResize, 1000);
        }

        function showError(msg) {
            log('ERROR: ' + msg);
            document.getElementById('error-detail').textContent = msg;
            document.getElementById('error-log').textContent = _logs.join('\n');
            showScreen('error');
        }

        function renderMarkdown(md) {
            try { return marked.parse(md); }
            catch (_) { return '<pre>' + md.replace(/</g, '&lt;') + '</pre>'; }
        }

        /* Enum-safe: ADO sends numbers or strings depending on SDK version */
        function isBuildCompleted(b) {
            var s = b.status;
            return s === 2 || s === 'completed' ||
                (typeof s === 'string' && s.toLowerCase() === 'completed');
        }

        function isBuildSucceeded(b) {
            var r = b.result;
            return r === 2 || r === 'succeeded' ||
                (typeof r === 'string' && r.toLowerCase() === 'succeeded');
        }

        /* ---- main logic ---- */
        var loadingTimer = setTimeout(function () {
            showError('Timeout reached (' + LOADING_TIMEOUT + 'ms). The analysis could not be loaded.');
        }, LOADING_TIMEOUT);

        VSS.init({ usePlatformScripts: true, usePlatformStyles: true });

        VSS.ready(function () {
            log('VSS.ready fired');
            try {
                var cfg = VSS.getConfiguration();
                log('cfg: ' + (cfg ? 'OK' : 'null') +
                    ', onBuildChanged: ' + (cfg && typeof cfg.onBuildChanged));

                if (!cfg || typeof cfg.onBuildChanged !== 'function') {
                    clearTimeout(loadingTimer);
                    showScreen('allgood');
                    return;
                }

                cfg.onBuildChanged(function (build) {
                    clearTimeout(loadingTimer);

                    if (!build) { showScreen('allgood'); return; }

                    log('build: id=' + build.id +
                        ', status=' + build.status + '(' + typeof build.status + ')' +
                        ', result=' + build.result + '(' + typeof build.result + ')');

                    if (!isBuildCompleted(build)) {
                        showScreen('running');
                        return;
                    }

                    if (isBuildSucceeded(build)) {
                        showScreen('allgood');
                        return;
                    }

                    log('Build failed/partial — fetching analysis...');
                    fetchAnalysis(build.id);
                });
            } catch (e) {
                clearTimeout(loadingTimer);
                showError('VSS.ready error: ' + e.message);
            }
        });

        function fetchAnalysis(buildId) {
            var projectId = VSS.getWebContext().project.id;
            var collectionUri = VSS.getWebContext().collection.uri;
            if (!collectionUri.endsWith('/')) collectionUri += '/';

            log('project=' + projectId + ', build=' + buildId);
            log('collectionUri=' + collectionUri);

            /* Step 1: Get auth token */
            VSS.getAccessToken().then(function (token) {
                log('Got access token (length=' + (token.token ? token.token.length : 'N/A') + ')');

                var authHeader = 'Bearer ' + token.token;

                /* Step 2: List build-level attachments of our type */
                var listUrl = collectionUri + projectId +
                    '/_apis/build/builds/' + buildId +
                    '/attachments/' + ATTACHMENT_TYPE +
                    '?api-version=7.1-preview.2';
                log('Fetching attachments list: ' + listUrl);

                fetch(listUrl, {
                    headers: { 'Authorization': authHeader }
                })
                .then(function (r) {
                    log('Attachments list response: ' + r.status);
                    if (!r.ok) throw new Error('Attachments list HTTP ' + r.status);
                    return r.json();
                })
                .then(function (data) {
                    if (!data || !data.value || data.value.length === 0) {
                        throw new Error('No attachments of type "' + ATTACHMENT_TYPE +
                            '" found. The CopilotFailureAnalysis task may not have run.');
                    }

                    log('Found ' + data.value.length + ' attachment(s)');

                    /* Find the attachment named "report" */
                    var attachment = null;
                    for (var i = 0; i < data.value.length; i++) {
                        log('Attachment[' + i + ']: name=' + data.value[i].name);
                        if (data.value[i].name === ATTACHMENT_NAME) {
                            attachment = data.value[i];
                            break;
                        }
                    }

                    if (!attachment) {
                        throw new Error('Attachment "' + ATTACHMENT_NAME +
                            '" not found among ' + data.value.length + ' attachment(s)');
                    }

                    /* Step 3: Download the attachment content */
                    var downloadUrl = (attachment._links && attachment._links.self &&
                        attachment._links.self.href) || attachment.url;

                    if (!downloadUrl) {
                        throw new Error('No download URL in attachment metadata');
                    }

                    log('Downloading attachment: ' + downloadUrl);

                    return fetch(downloadUrl, {
                        headers: { 'Authorization': authHeader }
                    });
                })
                .then(function (r) {
                    if (!r) return;
                    log('Attachment download response: ' + r.status +
                        ', content-type: ' + r.headers.get('content-type'));
                    if (!r.ok) throw new Error('Attachment download HTTP ' + r.status);
                    return r.text();
                })
                .then(function (md) {
                    if (!md) return;
                    if (md.trim().length > 0) {
                        log('Got analysis: ' + md.length + ' chars');
                        document.getElementById('analysis-content')
                            .innerHTML = renderMarkdown(md);
                        showScreen('analysis');
                    } else {
                        showError('Attachment was empty');
                    }
                })
                .catch(function (err) {
                    showError('Failed to fetch analysis: ' + err.message);
                });

            }).catch(function (tokenErr) {
                showError('Cannot get access token: ' + tokenErr.message);
            });
        }
    </script>
</body>
</html>

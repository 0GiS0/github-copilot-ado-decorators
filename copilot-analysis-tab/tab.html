<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copilot Failure Analysis</title>
    <script src="lib/VSS.SDK.min.js"></script>
    <style>
        :root {
            --cp-purple: #8957e5;
            --cp-purple-dark: #6e40c9;
            --cp-purple-light: #c297ff;
            --cp-bg: #f6f8fa;
            --cp-surface: #ffffff;
            --cp-text: #24292f;
            --cp-text-muted: #656d76;
            --cp-border: #d0d7de;
            --cp-success: #1a7f37;
            --cp-success-bg: #dafbe1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--cp-bg);
            color: var(--cp-text);
            min-height: 100vh;
        }

        /* --- Screen containers --- */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 55vh;
            padding: 48px 24px;
            animation: fadeIn 0.35s ease;
        }
        .screen.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* --- Spinner --- */
        .spinner {
            width: 44px; height: 44px;
            border: 4px solid var(--cp-border);
            border-top-color: var(--cp-purple);
            border-radius: 50%;
            animation: spin 0.75s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-text { font-size: 15px; color: var(--cp-text-muted); }

        /* --- All‑good --- */
        .hero-emoji { font-size: 64px; margin-bottom: 20px; }
        .allgood-title {
            font-size: 26px; font-weight: 600;
            color: var(--cp-success); margin-bottom: 10px;
        }
        .allgood-sub {
            color: var(--cp-text-muted); font-size: 15px; margin-bottom: 20px;
        }
        .badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--cp-success-bg); color: var(--cp-success);
            padding: 8px 18px; border-radius: 20px;
            font-size: 14px; font-weight: 500;
        }

        /* --- Running --- */
        .running-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .running-sub   { font-size: 14px; color: var(--cp-text-muted); }

        /* --- Analysis content --- */
        #analysis { display: none; padding: 24px; animation: fadeIn 0.35s ease; }
        #analysis.active { display: block; }

        .analysis-header {
            background: linear-gradient(135deg, var(--cp-purple), var(--cp-purple-dark));
            color: #fff; padding: 22px 28px;
            border-radius: 12px 12px 0 0;
            display: flex; align-items: center; gap: 14px;
        }
        .analysis-header-icon { font-size: 30px; }
        .analysis-header h1   { font-size: 19px; font-weight: 600; margin: 0; }
        .analysis-header p    { font-size: 13px; opacity: 0.85; margin-top: 3px; }

        .analysis-body {
            background: var(--cp-surface);
            border: 1px solid var(--cp-border);
            border-top: none;
            border-radius: 0 0 12px 12px;
            padding: 28px 32px;
            line-height: 1.65;
        }

        /* Markdown styles inside the analysis body */
        .analysis-body h1 { display: none; }
        .analysis-body h2 {
            font-size: 19px; margin: 28px 0 10px;
            padding-bottom: 6px; border-bottom: 1px solid var(--cp-border);
        }
        .analysis-body h3 { font-size: 16px; margin: 22px 0 8px; }
        .analysis-body p  { margin: 8px 0; }
        .analysis-body ul,
        .analysis-body ol { margin: 8px 0 8px 24px; }
        .analysis-body li { margin: 4px 0; }
        .analysis-body code {
            background: #eff1f3; padding: 2px 6px;
            border-radius: 4px; font-size: 13px;
        }
        .analysis-body pre {
            background: #1e1e1e; color: #d4d4d4;
            padding: 16px; border-radius: 8px;
            overflow-x: auto; margin: 14px 0;
            font-size: 13px;
        }
        .analysis-body pre code {
            background: none; padding: 0; color: inherit;
        }
        .analysis-body table { border-collapse: collapse; width: 100%; margin: 14px 0; }
        .analysis-body th,
        .analysis-body td { border: 1px solid var(--cp-border); padding: 8px 12px; text-align: left; }
        .analysis-body th { background: var(--cp-bg); font-weight: 600; }
        .analysis-body blockquote {
            border-left: 4px solid var(--cp-purple-light);
            padding: 10px 16px; margin: 14px 0;
            background: #f3f0ff; border-radius: 0 8px 8px 0;
            color: var(--cp-text-muted);
        }
        .analysis-body hr { border: none; border-top: 1px solid var(--cp-border); margin: 24px 0; }
        .analysis-body img { max-width: 100%; border-radius: 8px; }

        /* Error card */
        .error-card {
            background: #fff3cd; border: 1px solid #ffc107;
            padding: 16px 20px; border-radius: 10px;
            margin-top: 24px; text-align: center;
            font-size: 14px; color: #664d03;
            max-width: 480px;
        }
    </style>
</head>
<body>

    <!-- 1) Loading -->
    <div id="loading" class="screen active">
        <div class="spinner"></div>
        <p class="status-text">Loading Copilot analysis…</p>
    </div>

    <!-- 2) Build still running -->
    <div id="running" class="screen">
        <div class="hero-emoji">🤖</div>
        <div class="running-title">Standing by…</div>
        <p class="running-sub">The analysis will appear here once the build completes.</p>
    </div>

    <!-- 3) All good (no failures) -->
    <div id="allgood" class="screen">
        <div class="hero-emoji">✨</div>
        <div class="allgood-title">All good!</div>
        <p class="allgood-sub">No failures detected in this pipeline run.</p>
        <span class="badge">✅ All steps completed successfully</span>
    </div>

    <!-- 4) Analysis results -->
    <div id="analysis">
        <div class="analysis-header">
            <span class="analysis-header-icon">🤖</span>
            <div>
                <h1>Copilot Failure Analysis</h1>
                <p>AI-powered root cause analysis</p>
            </div>
        </div>
        <div class="analysis-body" id="analysis-content"></div>
    </div>

    <!-- marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>

    <script>
        /* ---- constants ---- */
        var TASK_GUID        = "1eb0639b-4621-4a25-a38d-f66f162787b6";
        var ATTACHMENT_TYPE  = "copilot-analysis";
        var ATTACHMENT_NAME  = "report";
        var LOADING_TIMEOUT  = 20000;   // 20 s safety net

        /* ---- helpers ---- */
        function log(msg) { console.log('[CopilotTab] ' + msg); }

        function showScreen(id) {
            log('showScreen → ' + id);
            var all = document.querySelectorAll('.screen, #analysis');
            for (var i = 0; i < all.length; i++) {
                all[i].classList.remove('active');
                if (!all[i].classList.contains('screen')) all[i].style.display = 'none';
            }
            var el = document.getElementById(id);
            if (!el) return;
            el.classList.add('active');
            if (id === 'analysis') el.style.display = 'block';
        }

        function renderMarkdown(md) {
            try {
                return marked.parse(md);
            } catch (_) {
                return '<pre>' + md.replace(/</g, '&lt;') + '</pre>';
            }
        }

        /* Enum-safe comparisons: ADO may send numbers OR strings */
        function isStateCompleted(state) {
            if (state === 2 || state === 'completed') return true;
            if (typeof state === 'string') return state.toLowerCase() === 'completed';
            return false;
        }

        function isBuildCompleted(b) {
            /* BuildStatus.Completed = 2 */
            if (b.status === 2 || b.status === 'completed') return true;
            if (typeof b.status === 'string') return b.status.toLowerCase() === 'completed';
            return false;
        }

        function isBuildSucceeded(b) {
            /* BuildResult.Succeeded = 2 */
            if (b.result === 2 || b.result === 'succeeded') return true;
            if (typeof b.result === 'string') return b.result.toLowerCase() === 'succeeded';
            return false;
        }

        /* ---- fetch attachment via REST (build-level, no timeline needed) ---- */
        function fetchAttachmentREST(projectId, buildId) {
            log('fetchAttachmentREST: trying build-level REST API');
            return new Promise(function (resolve, reject) {
                VSS.getAccessToken().then(function (token) {
                    VSS.require(['VSS/Authentication/Services'], function (AuthServices) {
                        try {
                            var header = AuthServices.authTokenManager
                                            .getAuthorizationHeader(token);
                            var uri = VSS.getWebContext().collection.uri;
                            if (!uri.endsWith('/')) uri += '/';

                            /* List all attachments of our type */
                            var listUrl = uri + projectId +
                                '/_apis/build/builds/' + buildId +
                                '/attachments/' + ATTACHMENT_TYPE +
                                '?api-version=7.0';

                            log('REST list URL: ' + listUrl);

                            fetch(listUrl, { headers: { 'Authorization': header } })
                                .then(function (r) {
                                    log('REST list response: ' + r.status);
                                    if (!r.ok) throw new Error('HTTP ' + r.status);
                                    return r.json();
                                })
                                .then(function (data) {
                                    var attachments = data.value || data;
                                    log('Attachments found: ' + (attachments ? attachments.length : 0));

                                    if (!attachments || attachments.length === 0) {
                                        reject(new Error('No attachments found'));
                                        return;
                                    }

                                    /* Find our attachment by name */
                                    var att = null;
                                    for (var i = 0; i < attachments.length; i++) {
                                        if (attachments[i].name === ATTACHMENT_NAME) {
                                            att = attachments[i];
                                            break;
                                        }
                                    }
                                    if (!att) {
                                        /* Just use the first one */
                                        att = attachments[0];
                                    }

                                    /* Download via _links or construct URL */
                                    var dlUrl = (att._links && att._links.self && att._links.self.href)
                                        ? att._links.self.href
                                        : uri + projectId + '/_apis/build/builds/' + buildId +
                                          '/attachments/' + ATTACHMENT_TYPE + '/' +
                                          encodeURIComponent(att.name) + '?api-version=7.0';

                                    log('Downloading attachment from: ' + dlUrl);

                                    fetch(dlUrl, { headers: { 'Authorization': header } })
                                        .then(function (r2) {
                                            log('Download response: ' + r2.status);
                                            if (!r2.ok) throw new Error('HTTP ' + r2.status);
                                            return r2.text();
                                        })
                                        .then(resolve)
                                        .catch(reject);
                                })
                                .catch(reject);
                        } catch (e) { reject(e); }
                    });
                }).catch(reject);
            });
        }

        /* ---- fetch via SDK getAttachment (needs timeline record) ---- */
        function fetchAttachmentSDK(client, projectId, buildId) {
            log('fetchAttachmentSDK: trying SDK getAttachment via timeline');
            return client.getBuildTimeline(projectId, buildId)
                .then(function (timeline) {
                    if (!timeline || !timeline.records) {
                        throw new Error('No timeline records');
                    }
                    log('Timeline records: ' + timeline.records.length);

                    /* Find completed CopilotFailureAnalysis record */
                    var rec = null;
                    for (var i = 0; i < timeline.records.length; i++) {
                        var r = timeline.records[i];
                        if (r.task && r.task.id &&
                            r.task.id.toLowerCase() === TASK_GUID) {
                            log('Found task record: state=' + r.state +
                                ' (type=' + typeof r.state + ')' +
                                ', result=' + r.result +
                                ', id=' + r.id);
                            if (isStateCompleted(r.state)) {
                                rec = r;
                                break;
                            }
                        }
                    }

                    if (!rec) {
                        throw new Error('Task record not found or not completed');
                    }

                    log('Using record ' + rec.id + ' from timeline ' + timeline.id);

                    return client.getAttachment(
                        projectId, buildId, timeline.id, rec.id,
                        ATTACHMENT_TYPE, ATTACHMENT_NAME
                    ).then(function (buf) {
                        return new TextDecoder('utf-8').decode(new Uint8Array(buf));
                    });
                });
        }

        /* ---- main logic ---- */
        var loadingTimer = setTimeout(function () {
            log('TIMEOUT: 20s reached, showing allgood');
            showScreen('allgood');
        }, LOADING_TIMEOUT);

        VSS.init({ usePlatformScripts: true, usePlatformStyles: true });

        VSS.ready(function () {
            log('VSS.ready fired');
            try {
                var cfg = VSS.getConfiguration();
                log('Configuration: ' + (cfg ? 'OK' : 'null') +
                    ', onBuildChanged: ' + (cfg && typeof cfg.onBuildChanged));

                if (!cfg || typeof cfg.onBuildChanged !== 'function') {
                    clearTimeout(loadingTimer);
                    showScreen('allgood');
                    return;
                }

                cfg.onBuildChanged(function (build) {
                    clearTimeout(loadingTimer);
                    log('onBuildChanged: status=' + build.status +
                        ' (type=' + typeof build.status + ')' +
                        ', result=' + build.result +
                        ' (type=' + typeof build.result + ')' +
                        ', id=' + build.id);

                    if (!build) { showScreen('allgood'); return; }

                    /* Build still running? */
                    if (!isBuildCompleted(build)) {
                        log('Build not completed yet');
                        showScreen('running');
                        return;
                    }

                    /* Build succeeded → task never ran (decorator condition: failed()) */
                    if (isBuildSucceeded(build)) {
                        log('Build succeeded, no analysis expected');
                        showScreen('allgood');
                        return;
                    }

                    log('Build failed/partial — fetching analysis...');
                    fetchAnalysis(build.id);
                });
            } catch (e) {
                log('ERROR in VSS.ready: ' + e.message);
                clearTimeout(loadingTimer);
                showScreen('allgood');
            }
        });

        function fetchAnalysis(buildId) {
            var projectId = VSS.getWebContext().project.id;
            log('fetchAnalysis: project=' + projectId + ', build=' + buildId);

            /* Strategy: try REST first (simpler, no timeline dependency),
               fall back to SDK getAttachment if REST fails */
            fetchAttachmentREST(projectId, buildId)
                .then(showAnalysisContent)
                .catch(function (restErr) {
                    log('REST failed: ' + restErr.message + ' — trying SDK...');

                    VSS.require(['TFS/Build/RestClient'], function (BuildRestClient) {
                        var client = BuildRestClient.getClient();
                        fetchAttachmentSDK(client, projectId, buildId)
                            .then(showAnalysisContent)
                            .catch(function (sdkErr) {
                                log('SDK also failed: ' + sdkErr.message);
                                log('Both methods failed — showing allgood');
                                showScreen('allgood');
                            });
                    });
                });
        }

        function showAnalysisContent(md) {
            if (md && md.trim().length > 0) {
                log('Got analysis content: ' + md.length + ' chars');
                document.getElementById('analysis-content')
                    .innerHTML = renderMarkdown(md);
                showScreen('analysis');
            } else {
                log('Empty analysis content');
                showScreen('allgood');
            }
        }
    </script>
</body>
</html>
